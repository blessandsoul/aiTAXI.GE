    <rect x="0" y="0"   width="368" height="64" rx="14" fill="#1A1400"/>
    <rect x="0" y="108" width="368" height="64" rx="14" fill="#1A1400"/>
    <rect x="0" y="216" width="368" height="64" rx="14" fill="#1A1400"/>
  </g>
</svg>
